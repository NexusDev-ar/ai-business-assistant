<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>NexusDev — Desarrollo web y software a medida</title>
<style>
  :root{
    --bg:#0c0c0e; --panel:#15151a; --panel2:#1c1c23; --line:#2a2a33;
    --txt:#eef0f4; --soft:#9aa0ab; --amber:#f5a623; --amber-ink:#1a1208;
    --bot:#20212a; --me:#f5a623;
  }
  *{ box-sizing:border-box; margin:0; padding:0; }
  body{ font-family:-apple-system,"Segoe UI",Roboto,sans-serif; background:var(--bg); color:var(--txt); min-height:100dvh; }

  .hero{ max-width:1100px; margin:0 auto; padding:26px 24px; }
  .nav{ display:flex; align-items:center; gap:10px; }
  .wordmark{ font-weight:800; font-size:22px; letter-spacing:.5px; }
  .wordmark .dev{ color:var(--amber); }
  .nav .links{ margin-left:auto; display:flex; gap:22px; color:var(--soft); font-size:14px; }
  .nav .links span:hover{ color:var(--txt); cursor:pointer; }
  .center{ max-width:820px; margin:12vh auto 0; padding:0 24px; text-align:center; }
  .center h1{ font-size:clamp(30px,6vw,52px); line-height:1.08; letter-spacing:-.5px; }
  .center h1 em{ color:var(--amber); font-style:normal; }
  .center p{ color:var(--soft); font-size:18px; margin-top:18px; max-width:600px; margin-inline:auto; }
  .cta{ margin-top:26px; display:inline-block; background:var(--amber); color:var(--amber-ink); font-weight:700; padding:13px 26px; border-radius:10px; text-decoration:none; }

  .launcher{
    position:fixed; right:22px; bottom:22px; z-index:50;
    width:62px; height:62px; border-radius:50%; border:none; cursor:pointer;
    background:var(--amber); color:var(--amber-ink); font-size:27px;
    box-shadow:0 10px 30px rgba(245,166,35,.4); display:grid; place-items:center;
    transition:transform .15s ease;
  }
  .launcher:hover{ transform:scale(1.06); }
  .launcher .close-ico{ display:none; }
  body.open .launcher .chat-ico{ display:none; }
  body.open .launcher .close-ico{ display:block; }

  .widget{
    position:fixed; right:22px; bottom:96px; z-index:50;
    width:380px; max-width:calc(100vw - 32px); height:580px; max-height:calc(100dvh - 130px);
    background:var(--panel); border:1px solid var(--line); border-radius:16px; overflow:hidden;
    display:none; flex-direction:column; box-shadow:0 24px 60px rgba(0,0,0,.5);
  }
  body.open .widget{ display:flex; animation:pop .18s ease; }
  @keyframes pop{ from{ opacity:0; transform:translateY(14px) scale(.96);} to{ opacity:1; transform:none; } }

  .whead{ background:linear-gradient(135deg,#1c1c23,#141419); padding:15px 16px; display:flex; align-items:center; gap:11px; border-bottom:1px solid var(--line); }
  .wavatar{ width:40px; height:40px; border-radius:12px; background:#0c0c0e; border:1px solid var(--line); display:grid; place-items:center; font-weight:800; }
  .wavatar b{ color:var(--amber); font-size:18px; }
  .whead h2{ font-size:15px; }
  .whead .st{ font-size:12px; color:#4ade80; margin-top:2px; display:flex; align-items:center; gap:5px; }
  .whead .st:before{ content:""; width:7px; height:7px; border-radius:50%; background:#4ade80; }
  .whead .x{ margin-left:auto; color:var(--soft); font-size:20px; cursor:pointer; background:none; border:none; }

  #chat{ flex:1; overflow-y:auto; padding:16px 14px; display:flex; flex-direction:column; gap:9px; background:var(--bg); }
  .row{ display:flex; }
  .row.me{ justify-content:flex-end; }
  .msg{ max-width:82%; padding:9px 12px; border-radius:13px; font-size:14px; line-height:1.4; white-space:pre-wrap; word-wrap:break-word; }
  .msg.bot{ background:var(--bot); border-bottom-left-radius:4px; }
  .msg.me{ background:var(--me); color:var(--amber-ink); font-weight:500; border-bottom-right-radius:4px; }
  .typing{ color:var(--soft); font-style:italic; }

  /* botones de opción (quick replies) */
  .chips{ display:flex; flex-wrap:wrap; gap:7px; margin-top:2px; }
  .chip{ background:transparent; border:1px solid var(--amber); color:var(--amber); border-radius:16px; padding:8px 13px; font-size:13px; cursor:pointer; transition:all .12s; font-weight:500; }
  .chip:hover{ background:var(--amber); color:var(--amber-ink); }

  .wform{ display:flex; gap:8px; padding:11px; background:var(--panel2); border-top:1px solid var(--line); }
  .wform input{ flex:1; background:var(--bg); border:1px solid var(--line); color:var(--txt); border-radius:22px; padding:10px 15px; font-size:14px; outline:none; }
  .wform input:focus{ border-color:var(--amber); }
  .wsend{ width:42px; height:42px; border-radius:50%; border:none; flex:none; cursor:pointer; background:var(--amber); color:var(--amber-ink); font-size:17px; }
  .wsend:disabled{ opacity:.5; }
  .wfoot{ text-align:center; font-size:11px; color:var(--soft); padding:6px; background:var(--panel2); }
</style>
</head>
<body>
  <div class="hero">
    <nav class="nav">
      <span class="wordmark">NEXUS<span class="dev">DEV</span></span>
      <div class="links"><span>Servicios</span><span>Trabajos</span><span>Blog</span><span>Contacto</span></div>
    </nav>
  </div>
  <div class="center">
    <h1>Desarrollo web y <em>sistemas a medida</em></h1>
    <p>Páginas, sistemas de gestión, tiendas online y asistentes de IA. Software profesional que resuelve problemas reales.</p>
    <a class="cta" href="#" onclick="openWidget();return false;">Hablar con nosotros</a>
  </div>

  <div class="widget" id="widget">
    <div class="whead">
      <div class="wavatar"><b>N</b></div>
      <div>
        <h2>Asistente NexusDev</h2>
        <div class="st" id="status">en línea</div>
      </div>
      <button class="x" onclick="closeWidget()" title="Cerrar">✕</button>
    </div>
    <div id="chat"></div>
    <form class="wform" id="f">
      <input id="in" placeholder="Escribí tu consulta…" autocomplete="off">
      <button class="wsend" id="send" title="Enviar">➤</button>
    </form>
    <div class="wfoot">🔒 Asistente con IA · NexusDev</div>
  </div>

  <button class="launcher" id="launcher" onclick="toggleWidget()" title="Chatear">
    <span class="chat-ico">💬</span><span class="close-ico">✕</span>
  </button>

<script>
  const chat = document.getElementById("chat");
  const form = document.getElementById("f");
  const input = document.getElementById("in");
  const send = document.getElementById("send");
  const statusEl = document.getElementById("status");
  const messages = [];
  let greeted = false;

  function openWidget(){
    document.body.classList.add("open");
    if(!greeted){ greeted = true;
      bubble("¡Hola! 👋 Soy el asistente de NexusDev. ¿En qué te puedo ayudar?", "bot");
      renderChips(["Necesito una web","Un sistema a medida","Una tienda online","Un asistente como este"]);
    }
    setTimeout(()=>input.focus(),100);
  }
  function closeWidget(){ document.body.classList.remove("open"); }
  function toggleWidget(){ document.body.classList.contains("open") ? closeWidget() : openWidget(); }

  function bubble(text, who){
    const row = document.createElement("div"); row.className = "row " + who;
    const m = document.createElement("div"); m.className = "msg " + who; m.textContent = text;
    row.appendChild(m); chat.appendChild(row); chat.scrollTop = chat.scrollHeight; return row;
  }

  // botones de opción clickeables
  function clearChips(){ document.querySelectorAll(".chips").forEach(c => c.remove()); }
  // ícono según el tema de la opción (le da color a los botones)
  function iconFor(t){
    const s = t.toLowerCase();
    if(/web|p[aá]gina|landing|sitio/.test(s)) return "🌐 ";
    if(/tienda|ecommerce|e-commerce|shop|online/.test(s)) return "🛒 ";
    if(/sistema|gesti[oó]n|panel|software|app/.test(s)) return "⚙️ ";
    if(/asistente|bot|\bia\b|chat/.test(s)) return "🤖 ";
    if(/asesor|humano|hablar|persona|contact|llam/.test(s)) return "👤 ";
    if(/turno|reserva|agenda|tanda|cita/.test(s)) return "📅 ";
    if(/precio|presupuesto|costo|cotiz/.test(s)) return "💬 ";
    if(/s[ií]\b|dale|listo|ok/.test(s)) return "✅ ";
    return "✨ ";
  }
  function renderChips(opts){
    clearChips();
    if(!opts || !opts.length) return;
    const box = document.createElement("div"); box.className = "chips";
    opts.forEach(op => {
      const b = document.createElement("button"); b.className = "chip"; b.textContent = iconFor(op) + op;
      b.onclick = () => { clearChips(); sendMessage(op); };  // manda el texto sin ícono
      box.appendChild(b);
    });
    chat.appendChild(box); chat.scrollTop = chat.scrollHeight;
  }

  // separa el texto de la línea "OPCIONES: a | b | c"
  function parseOptions(reply){
    const lines = reply.split("\n");
    const idx = lines.findIndex(l => /^\s*opciones\s*:/i.test(l));
    if(idx === -1) return { text: reply.trim(), opts: [] };
    const opts = lines[idx].replace(/^\s*opciones\s*:/i,"").split("|").map(s=>s.trim()).filter(Boolean);
    lines.splice(idx,1);
    return { text: lines.join("\n").trim(), opts };
  }

  async function sendMessage(text){
    text = (text || "").trim(); if(!text) return;
    clearChips();
    bubble(text, "me");
    messages.push({ role:"user", content:text });
    send.disabled = true; statusEl.textContent = "escribiendo…";
    const typing = bubble("escribiendo…", "bot"); typing.querySelector(".msg").classList.add("typing");
    try{
      const r = await fetch("/api/chat", { method:"POST", headers:{ "Content-Type":"application/json" }, body: JSON.stringify({ messages }) });
      const data = await r.json(); typing.remove();
      const raw = data.reply || ("⚠️ " + (data.error || "algo falló"));
      const { text: clean, opts } = parseOptions(raw);
      bubble(clean, "bot");
      messages.push({ role:"assistant", content:raw });
      renderChips(opts);
    }catch(err){ typing.remove(); bubble("⚠️ No me pude conectar. ¿Está corriendo el servidor?", "bot"); }
    finally{ send.disabled = false; statusEl.textContent = "en línea"; input.focus(); }
  }

  form.addEventListener("submit", (e) => {
    e.preventDefault();
    const text = input.value.trim(); if(!text) return;
    input.value = "";
    sendMessage(text);
  });
</script>
</body>
</html>
